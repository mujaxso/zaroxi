name: CI macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-ci-macos-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ci-macos-registry-

      - name: Restore cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-ci-macos-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ci-macos-index-

      - name: Restore cargo build output
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-ci-macos-target-${{ hashFiles('**/Cargo.lock') }}

      - name: build
        run: cargo build --workspace --verbose

      - name: test
        run: cargo test --workspace --verbose
